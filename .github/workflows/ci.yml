name: CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: CI-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    name: CI
    uses: StanfordBDHG/.github/.github/workflows/swift-package-ci.yml@v2
    with:
      linux_run_tests: true
    secrets: inherit

  dockerimage:
    name: Docker Build and Push
    if: github.event_name != 'pull_request'
    uses: StanfordBDHG/.github/.github/workflows/docker-build-and-push.yml@v2
    with:
      imageName: stanfordspezi/spezistudyplatform-server
    permissions:
      contents: read
      packages: write
    secrets: inherit
