volumes:
  db_data:
  keycloak_db_data:

services:
  db:
    image: postgres:18-alpine
    volumes:
      - db_data:/var/lib/postgresql/data
    environment:
      POSTGRES_USER: &db_username ${DATABASE_USERNAME}
      POSTGRES_PASSWORD: &db_password ${DATABASE_PASSWORD}
      POSTGRES_DB: &db_name ${DATABASE_NAME}
    ports:
      - '5432:5432'
    healthcheck:
      test: ["CMD-SHELL", "pg_isready"]
      interval: 5s
      timeout: 5s
      retries: 5
  app:
    image: spezistudyserver:latest
    build:
      context: .
    environment:
      LOG_LEVEL: ${LOG_LEVEL}
      DATABASE_HOST: db
      DATABASE_NAME: *db_name
      DATABASE_USERNAME: *db_username
      DATABASE_PASSWORD: *db_password
      KEYCLOAK_URL: http://keycloak:8080
      KEYCLOAK_REALM: ${KEYCLOAK_REALM}
      KEYCLOAK_CLIENT_ID: ${KEYCLOAK_CLIENT_ID}
      KEYCLOAK_CLIENT_SECRET: ${KEYCLOAK_CLIENT_SECRET}
      KEYCLOAK_RESEARCHER_ROLE: ${KEYCLOAK_RESEARCHER_ROLE}
      KEYCLOAK_PARTICIPANT_ROLE: ${KEYCLOAK_PARTICIPANT_ROLE}
    depends_on:
      db:
        condition: service_healthy
      keycloak:
        condition: service_healthy
    ports:
      - '8080:8080'
    command: ["serve", "--env", "production", "--hostname", "0.0.0.0", "--port", "8080"]
  migrate:
    image: spezistudyserver:latest
    build:
      context: .
    environment:
      DATABASE_HOST: db
      DATABASE_NAME: *db_name
      DATABASE_USERNAME: *db_username
      DATABASE_PASSWORD: *db_password
    depends_on:
      db:
        condition: service_healthy
    command: ["migrate", "--yes"]
    deploy:
      replicas: 0
  revert:
    image: spezistudyserver:latest
    build:
      context: .
    environment:
      DATABASE_HOST: db
      DATABASE_NAME: *db_name
      DATABASE_USERNAME: *db_username
      DATABASE_PASSWORD: *db_password
    depends_on:
      db:
        condition: service_healthy
    command: ["migrate", "--revert", "--yes"]
    deploy:
      replicas: 0
  keycloak-db:
    image: postgres:18-alpine
    volumes:
      - keycloak_db_data:/var/lib/postgresql/data
    environment:
      POSTGRES_USER: &kc_db_username ${KEYCLOAK_DB_USERNAME}
      POSTGRES_PASSWORD: &kc_db_password ${KEYCLOAK_DB_PASSWORD}
      POSTGRES_DB: &kc_db_name ${KEYCLOAK_DB_NAME}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready"]
      interval: 5s
      timeout: 5s
      retries: 5
  keycloak:
    image: keycloak/keycloak:26.0
    command: start-dev --import-realm --health-enabled=true
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: ${KC_BOOTSTRAP_ADMIN_USERNAME}
      KC_BOOTSTRAP_ADMIN_PASSWORD: ${KC_BOOTSTRAP_ADMIN_PASSWORD}
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://keycloak-db:5432/${KEYCLOAK_DB_NAME}
      KC_DB_USERNAME: *kc_db_username
      KC_DB_PASSWORD: *kc_db_password
    volumes:
      - ./docker/keycloak/realm-export.json:/opt/keycloak/data/import/realm-export.json:ro
    depends_on:
      keycloak-db:
        condition: service_healthy
    ports:
      - '8180:8080'
    healthcheck:
      test:
        - CMD-SHELL
        - |
          exec 3<>/dev/tcp/localhost/9000 &&
          echo -e 'GET /health/ready HTTP/1.1\r\nHost: localhost\r\nConnection: close\r\n\r\n' >&3 &&
          head -1 <&3 | grep -q '200 OK'
      start_period: 30s
      interval: 10s
      timeout: 5s
      retries: 12
