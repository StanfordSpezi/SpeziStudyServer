name: Build and Test

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

concurrency:
  group: Build-and-Test-${{ github.ref }}
  cancel-in-progress: true

jobs:
  macos_tests:
    name: Build and Test Swift Package ${{ matrix.platform.name }} (${{ matrix.config }})
    uses: StanfordBDHG/.github/.github/workflows/xcodebuild-or-fastlane.yml@v2
    strategy:
      matrix:
        config: [Debug, Release]
        platform:
          - name: macOS
            destination: 'platform=macOS,arch=arm64'
      fail-fast: false
    with:
      runsonlabels: '["macOS", "self-hosted"]'
      scheme: SpeziStudyPlatformServer
      destination: ${{ matrix.platform.destination }}
      buildConfig: ${{ matrix.config }}
      resultBundle: ${{ format('SpeziStudyPlatformServer-{0}-{1}.xcresult', matrix.platform.name, matrix.config) }}
      artifactname: ${{ format('SpeziStudyPlatformServer-{0}-{1}.xcresult', matrix.platform.name, matrix.config) }}
  linux_tests:
    name: Build and Test Swift Package Linux (${{ matrix.config }})
    uses: StanfordBDHG/.github/.github/workflows/swift-test.yml@test-flag-for-swift-test
    strategy:
      matrix:
        config: [Debug, Release]
      fail-fast: false
    with:
      runs_on_labels: '["blacksmith-4vcpu-ubuntu-2404"]'
      build_configuration: ${{ matrix.config }}
      test_flags: '--no-parallel'
      artifact_name: ${{ format('SpeziStudyPlatformServer-Package-Linux-{0}.lcov', matrix.config) }}
  uploadcoveragereport:
    name: Upload Coverage Report
    needs: [macos_tests, linux_tests]
    uses: StanfordBDHG/.github/.github/workflows/create-and-upload-coverage-report.yml@v2
    with:
      coveragereports: SpeziStudyPlatformServer-*.xcresult
      coveragereports_lcov: SpeziStudyPlatformServer-Package-Linux-*.lcov
    secrets:
      token: ${{ secrets.CODECOV_TOKEN }}